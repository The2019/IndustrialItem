{% extends 'base.html' %}

{% block title %}Documents{% endblock %}

{% block content %}
    <h1>Documents</h1>

    <!-- Search Bar -->
    <form class="mb-4" method="GET">
        <input type="text" name="search" value="{{ query }}" class="form-control" placeholder="Search documents...">
    </form>

    <!-- Add Document Button -->
    <a href="{{ url_for('upload_document') }}" class="btn btn-custom mb-3">Upload Document</a>

    <!-- Documents Table -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Category</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for document in documents %}
            <tr>
                <td>{{ document.name }}</td>
                <td>{{ document.category }}</td>
                <td>
                    <a href="{{ url_for('static', filename=document.file_path) }}" class="btn btn-custom btn-sm" target="_blank">Download</a>
                    <!-- Add Delete Button -->
                    <a href="{{ url_for('delete_document', document_id=document.id) }}" class="btn btn-danger btn-sm" onclick="return confirm('Are you sure you want to delete this item? This action cannot be undone.')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
