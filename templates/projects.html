{% extends 'base.html' %}

{% block title %}Projects{% endblock %}

{% block content %}
    <h1>Projects</h1>

    <!-- Search Bar -->
    <form class="mb-4" method="GET">
        <input type="text" name="search" value="{{ query }}" class="form-control" placeholder="Search projects...">
    </form>

    <!-- Add Project Button -->
    <a href="{{ url_for('add_project') }}" class="btn btn-custom mb-3">Add Project</a>

    <!-- Projects Table -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Name</th>
                <th>Description</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for project in projects %}
            <tr>
                <td>{{ project.name }}</td>
                <td>{{ project.description }}</td>
                <td>
                    <a href="{{ url_for('use_item_in_project', project_id=project.id) }}" class="btn btn-custom btn-sm">Use Materials</a>
                    <a href="{{ url_for('delete_project', project_id=project.id) }}" class="btn btn-danger btn-sm ml-2" onclick="return confirm('Are you sure you want to delete this project?');">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
{% endblock %}
