<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventory Management{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" type="image/png">
    <!-- If you're using PNG -->
    <!-- <link rel="icon" href="{{ url_for('static', filename='images/favicon.png') }}" type="image/png"> -->
    <!-- For Apple devices -->
    <!-- <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/favicon.png') }}"> -->

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Container for both sidebar and content */
        .container {
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar styles */
        .sidebar {
            width: 200px;
            background-color: #C4DFE6; /* Light blue */
            padding-top: 20px;
            position: fixed;
            top: 0;
            bottom: 0;
            left: 0;
            display: flex;
            flex-direction: column;
            padding-left: 10px;
        }

        .sidebar img {
            width: 60px; /* Resize the logo */
            height: auto;
            margin-bottom: 10px; /* Add space below the image */
        }

        .sidebar h1 {
            font-size: 18px;
            font-weight: bold;
            color: black;
            margin: 0;
        }

        .sidebar ul {
            list-style-type: none;
            padding-left: 0;
            margin-top: 20px;
        }

        .sidebar li {
            margin: 20px 0;
        }

        .sidebar a {
            text-decoration: none;
            color: black;
            padding: 10px;
            display: block;
            border-radius: 5px;
            font-weight: bold;
        }

        .sidebar a:hover {
            background-color: #A9C9D1;
        }

        /* Main content area */
        .main-content {
            margin-left: 220px;
            padding: 20px;
            flex: 1;
        }

        /* Button styling */
        .btn-custom {
            background-color: #66A5AD !important;
            border-color: #66A5AD !important;
            color: black !important;
        }

        .btn-custom:hover {
            background-color: #558F96 !important;
            border-color: #558F96 !important;
            color: black !important;
        }

        /* Responsive design */
        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }

            .main-content {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar">
            <!-- Logo and Text inside the sidebar -->
            <img src="{{ url_for('static', filename='IndustrialItem.png') }}" alt="IndustrialItem Logo">
            <h1>IndustrialItem</h1>

            <!-- Sidebar Menu -->
            <ul>
                <li><a href="{{ url_for('dashboard') }}">Dashboard</a></li>
                <li><a href="{{ url_for('inventory') }}">Inventory</a></li>
                <li><a href="{{ url_for('documents') }}">Documents</a></li>
                <li><a href="{{ url_for('projects') }}">Projects</a></li>
            </ul>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            {% block content %}{% endblock %}
        </div>
    </div>
</body>
</html>
