{% extends 'base.html' %}

{% block title %}Use Item{% endblock %}

{% block content %}
    <h1>Use Item: {{ item.name }}</h1>
    <form method="POST">
        <div class="form-group">
            <label for="quantity">Quantity:</label>
            <input type="number" name="quantity" id="quantity" class="form-control" min="1" required>
        </div>
        <button type="submit" name="action" value="take" class="btn btn-danger mt-3">Use (Take)</button>
        <button type="submit" name="action" value="add" class="btn btn-success mt-3">Restock (Add)</button>
    </form>
{% endblock %}
